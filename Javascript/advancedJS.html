    <h1><span id="hr"></span>:<span id="min"></span>:<span id="sec"></span></h1>


    <script>
        setInterval(() => {
            const today = new Date()
            // console.log(today)
            // console.log(today.getHours())
            document.getElementById('hr').textContent = today.getHours()
            document.getElementById('min').textContent = today.getMinutes()
            document.getElementById('sec').textContent = today.getSeconds()
        }, 1000)


    </script>

    <h1 id="countDown5"></h1>

    <script>
        function countDown(count) {
            let remainingCount = count


            const time = setInterval(() => {
                document.getElementById("countDown5").textContent = remainingCount

                remainingCount--
                if (remainingCount < 0) {
                    clearInterval(time)
                    document.getElementById("countDown5").textContent = 'Times Up'
                }
            }, 1000)


        }


        countDown(5)
    </script>



    <div style="font-size: 60px; color: blue; text-align: center;" id="Loading">Loading</div>

    <div style="font-size: 60px; color: red; text-align: center;" class="display" id="pageData">Lorem ipsum dolor sit
        amet consectetur, adipisicing elit. Incidunt fugiat deleniti ut veritatis voluptate in necessitatibus maxime
        cumque, repudiandae error delectus animi recusandae laborum fuga numquam corporis magni.</div>


    <script>

        function fetchData() {
            document.getElementById("Loading").classList.add('display')
            document.getElementById("pageData").classList.remove('display')
            document.getElementById("pageData").classList.add('showContent')
        }

        // document.body.addEventListener('DOMContentLoaded',()=>{} )

        setTimeout(fetchData, 10000)
    </script>
