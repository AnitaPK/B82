<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1 class="text-primary text-center display-4">Project management</h1>

<nav class="ps-5 container">
    <input type="text" id="searchKey"/>
    <button id="searchBTN" class="btn btn-primary">Search (Add icon)</button>
    <select id="selectStatus">
        <option value="">Select status</option>
        <option value="Completed">Completed</option>
        <option value="In Progress">In progress</option>
    </select>
<button onclick="filterByStatus()">Filter</button>

</nav>

    <div class="container" style="height: 700px;">
        <table class="table">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Project Title</th>
                    <th scope="col">Department</th>
                    <th scope="col">Priority</th>
                    <th scope="col">Status</th>
                    <th scope="col">Start Date</th>
                    <th scope="col">End Date</th>
                </tr>
            </thead>
            <tbody id="projectsRows"></tbody>
        </table>
    </div>

<nav aria-label="Page navigation example">
  <ul class="pagination" id="paginationList">
    
  </ul>
</nav>

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
